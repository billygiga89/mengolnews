<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MengolNews</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="/images/escudo.png" />
    <style>
        body {
            background: #0d0d0d;
            margin: 0;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4848196754894012" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app"></div>
    <div id="blazor-error-ui">
        Ocorreu um erro inesperado.
        <a href="." class="reload">Recarregar</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/infiniteScroll.js"></script>
    <script>
        function atualizarHora() {
            const el = document.getElementById('header-hora');
            if (el) {
                const agora = new Date();
                el.textContent = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            }
        }

        function aplicarTemp(temp) {
            const tentarAtualizar = setInterval(() => {
                const el = document.getElementById('header-clima');
                if (el) {
                    el.textContent = `${temp}°C`;
                    clearInterval(tentarAtualizar);
                }
            }, 200);
        }

        const buscarClima = (lat, lon) => {
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
                .then(r => r.json())
                .then(d => {
                    const temp = Math.round(d.current_weather.temperature);
                    localStorage.setItem('clima-temp', temp);
                    aplicarTemp(temp);
                }).catch(() => { });
        };

        document.addEventListener('DOMContentLoaded', () => {
            atualizarHora();
            setInterval(atualizarHora, 1000);

            // Mostra cache imediatamente
            const cached = localStorage.getItem('clima-temp');
            if (cached) aplicarTemp(cached);

            // Busca localização por IP (sem permissão, instantâneo)
            fetch('https://ipapi.co/json/')
                .then(r => r.json())
                .then(d => buscarClima(d.latitude, d.longitude))
                .catch(() => buscarClima(-3.72, -38.54)); // fallback Fortaleza
        });
    </script>
    <script>
        function playGolSound() {
            const audio = new Audio('/sounds/gol.mp3');
            audio.volume = 0.6;
            audio.play().catch(() => { });
        }
    </script>
</body>
</html>
