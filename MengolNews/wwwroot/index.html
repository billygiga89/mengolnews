<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MengolNews</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="/images/escudo.png" />
    <style>
        body {
            background: #0d0d0d;
            margin: 0;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4848196754894012" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app"></div>

    <div id="blazor-error-ui">
        Ocorreu um erro inesperado.
        <a href="." class="reload">Recarregar</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/infiniteScroll.js"></script>
    <script>
        function iniciarHeaderInfo() {
            const horaEl = document.getElementById('header-hora');
            const climaEl = document.getElementById('header-clima');
            if (!horaEl) return;

            // Hora em tempo real
            setInterval(() => {
                if (horaEl) {
                    const agora = new Date();
                    horaEl.textContent = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                }
            }, 1000);

            // Clima via geolocalização + Open-Meteo (gratuito, sem API key)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async pos => {
                    try {
                        const { latitude, longitude } = pos.coords;
                        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const d = await r.json();
                        const temp = Math.round(d.current_weather.temperature);
                        if (climaEl) climaEl.textContent = `${temp}°C`;
                    } catch { }
                }, () => {
                    // sem permissão, tenta Fortaleza como fallback
                    fetch('https://api.open-meteo.com/v1/forecast?latitude=-3.72&longitude=-38.54&current_weather=true')
                        .then(r => r.json())
                        .then(d => {
                            const temp = Math.round(d.current_weather.temperature);
                            if (climaEl) climaEl.textContent = `${temp}°C`;
                        }).catch(() => { });
                });
            }
        }

        // Aguarda o Blazor renderizar
        document.addEventListener('DOMContentLoaded', () => {
            const interval = setInterval(() => {
                if (document.getElementById('header-hora')) {
                    iniciarHeaderInfo();
                    clearInterval(interval);
                }
            }, 300);
        });
    </script>
    <script>
        function playGolSound() {
            const audio = new Audio('/sounds/gol.mp3');
            audio.volume = 0.6;
            audio.play().catch(() => { });
        }
    </script>
</body>
</html>
